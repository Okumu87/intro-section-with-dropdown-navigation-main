<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Intro section with dropdown navigation</title>
</head>
<body>

  <div class="content">
    <nav>
    <div class="logo">
      <img src="./images/logo.svg" alt="snap logo">
    <ul class="nav-links">
       <li ><a href="#">Features <img class="arrow-down"  src="./images/icon-arrow-down.svg" alt="dropdown icon"></a></li>
        <li><a href="#">Company <img class="arrow-down" src="./images/icon-arrow-down.svg" alt="dropdown icon"></a></li>
        <li><a href="#">Careers</a></li>
       <li><a href="#">About</a></li>
    </ul>
    </div>
      <!-- auth links -->
    <div class="auth-links">
      <a href="#" class="login">Login</a>
      <a href="#" class="register">Register</a>
    </div>
  </nav>
  <!-- main-content -->

  <main>
    <div class="text-content">
    <h1>Make remote work</h1>
    <p>Get your team in sync, no matter your location. Streamline processes,create team rituals, and watch productivity soar.</p>
    <a href="#" class="learn-more">Learn more</a>

    <div class="logo-content">
      <img src="./images/client-databiz.svg" alt="databiz logo">
      <img src="./images/client-audiophile.svg" alt="audiophile logo">
      <img src="./images/client-meet.svg" alt="meet logo">
      <img src="./images/client-maker.svg" alt="maker logo">
    </div>
    </div>
    <div class="image-left__content">
      <img src="./images/image-hero-desktop.png" alt="remote work image">
    </div>

  </main>


  </div>
  
<!-- attribution -->
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener">Frontend Mentor</a>. 
    Coded by <a href="#" target="_blank" rel="noopener">Christopher</a>.
  </div>
</body>
</html>
