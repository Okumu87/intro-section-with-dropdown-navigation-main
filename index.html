<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Intro section with dropdown navigation</title>
</head>
<body>
<header class="navbar">
  <div class="nav-left">
    <img src="./images/logo.svg" alt="Snap Logo" class="logo">
    <nav class="nav-links">
      <div class="dropdown">
        <button class="dropbtn">Features <img src="icon-arrow-down.svg" alt=""></button>
        <div class="dropdown-content">
          <a href="#"><img src="icon-todo.svg" alt=""> Todo List</a>
          <a href="#"><img src="icon-calendar.svg" alt=""> Calendar</a>
          <a href="#"><img src="icon-reminders.svg" alt=""> Reminders</a>
          <a href="#"><img src="icon-planning.svg" alt=""> Planning</a>
        </div>
      </div>
      <div class="dropdown">
        <button class="dropbtn">Company <img src="icon-arrow-down.svg" alt=""></button>
        <div class="dropdown-content">
          <a href="#">History</a>
          <a href="#">Our Team</a>
          <a href="#">Blog</a>
        </div>
      </div>
      <a href="#">Careers</a>
      <a href="#">About</a>
    </nav>
  </div>
  <div class="nav-right">
    <button class="btn-login">Login</button>
    <button class="btn-register">Register</button>
  </div>
</header>

<main class="hero">
  <section class="hero-content">
    <h1>Make remote work</h1>
    <p>Get your team in sync, no matter your location. Streamline processes, create corporate rituals, and watch productivity soar.</p>
    <button class="btn-main">Learn more</button>
    <div class="client-logos">
      <img src="client-databiz.svg" alt="Databiz">
      <img src="client-audiophile.svg" alt="Audiophile">
      <img src="client-meet.svg" alt="Meet">
      <img src="client-maker.svg" alt="Maker">
    </div>
  </section>
  <div class="hero-image">
    <img src="image-hero-desktop.png" alt="Hero Illustration">
  </div>
</main>
<!-- attribution -->
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener">Frontend Mentor</a>. 
    Coded by <a href="#" target="_blank" rel="noopener">Christopher</a>.
  </div>

  <script src="app.js"></script>
</body>
</html>
